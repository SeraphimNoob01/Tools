<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Forge Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="icon" type="image/svg+xml" href="assets/faflogo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:       #0a0a0a;
      --text-primary:     rgba(255,255,255,0.88);
      --text-muted:       rgba(255,255,255,0.28);
      --text-dim:         rgba(255,255,255,0.12);
      --accent:           #ff8c00;
      --accent-glow:      rgba(255,140,0,0.12);
      --accent-glow-mid:  rgba(255,140,0,0.35);
      --accent-glow-str:  rgba(255,140,0,0.7);
      --border-subtle:    rgba(255,255,255,0.06);
      --border-accent:    rgba(255,140,0,0.3);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .site-header {
      position: relative;
      padding: 28px 48px;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border-subtle);
      overflow: hidden;
      user-select: none;
      z-index: 10;
    }

    .site-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      -webkit-mask-image: radial-gradient(ellipse 85% 110% at 50% 50%, black 20%, transparent 100%);
              mask-image: radial-gradient(ellipse 85% 110% at 50% 50%, black 20%, transparent 100%);
    }

    .site-header::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0.7;
      animation: headerGlowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes headerGlowPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);    opacity: 0.7; }
      50%       { transform: translate(-50%,-50%) scale(1.1); opacity: 0.4; }
    }

    .header-line {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
      box-shadow: 0 0 20px var(--accent-glow-str);
    }

    .header-inner {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hdr-corner {
      position: absolute;
      width: 18px; height: 18px;
      opacity: 0.35;
      z-index: 2;
    }
    .hdr-tl { top: 10px; left: 16px; border-top: 1px solid rgba(255,140,0,0.5); border-left: 1px solid rgba(255,140,0,0.5); }
    .hdr-tr { top: 10px; right: 16px; border-top: 1px solid rgba(255,140,0,0.5); border-right: 1px solid rgba(255,140,0,0.5); }
    .hdr-bl { bottom: 10px; left: 16px; border-bottom: 1px solid rgba(255,140,0,0.5); border-left: 1px solid rgba(255,140,0,0.5); }
    .hdr-br { bottom: 10px; right: 16px; border-bottom: 1px solid rgba(255,140,0,0.5); border-right: 1px solid rgba(255,140,0,0.5); }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px; height: 38px;
      border: 1px solid var(--border-accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,140,0,0.06);
      box-shadow: 0 0 16px var(--accent-glow);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 20px; height: 20px; }

    .logo-text { display: flex; flex-direction: column; line-height: 1; }
    .logo-title { font-size: 15px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-primary); }
    .logo-sub   { font-size: 9px; font-weight: 400; letter-spacing: 0.45em; text-transform: uppercase; color: var(--accent); opacity: 0.6; margin-top: 3px; }

    .gh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid var(--border-accent);
      border-radius: 4px;
      background: transparent;
      color: var(--accent);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .gh-btn:hover { background: rgba(255,140,0,0.08); box-shadow: 0 0 20px var(--accent-glow); }
    .gh-btn svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── 404 CONTENT ── */
    .page-404 {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      overflow: hidden;
    }

    .page-404-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      -webkit-mask-image: radial-gradient(ellipse 70% 80% at 50% 50%, black 20%, transparent 100%);
              mask-image: radial-gradient(ellipse 70% 80% at 50% 50%, black 20%, transparent 100%);
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 28px 28px; }
    }

    .page-404-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,140,0,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .content-404 {
      position: relative;
      z-index: 2;
      max-width: 480px;
    }

    .badge-404 {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--border-accent);
      border-radius: 20px;
      background: rgba(255,140,0,0.06);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
    }

    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow-str);
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .num-404 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(96px, 18vw, 160px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,140,0,0.25);
      background: linear-gradient(180deg, rgba(255,140,0,0.5) 0%, rgba(255,140,0,0.05) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: 16px;
      user-select: none;
    }

    .title-404 {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .desc-404 {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .actions-404 {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 0 28px var(--accent-glow-mid); transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: 1px solid var(--border-accent);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,140,0,0.05); }

    /* ── FOOTER ── */
    .site-footer {
      position: relative;
      padding: 36px 48px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }

    .site-footer::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,140,0,0.25) 50%, transparent 100%);
    }

    .footer-left { font-size: 9px; font-weight: 400; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-dim); }
    .footer-left span { color: var(--accent); opacity: 0.55; }

    .footer-right { display: flex; gap: 28px; }
    .footer-right a { font-size: 9px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
    .footer-right a:hover { color: var(--accent); }

    @media (max-width: 768px) {
      .site-header { padding: 24px; }
      .gh-btn { display: none; }
      .site-footer { flex-direction: column; gap: 16px; text-align: center; padding: 28px 24px; }
      .footer-right { gap: 20px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-line"></div>
    <div class="hdr-corner hdr-tl"></div>
    <div class="hdr-corner hdr-tr"></div>
    <div class="hdr-corner hdr-bl"></div>
    <div class="hdr-corner hdr-br"></div>

    <div class="header-inner">
      <a href="/" class="logo-block">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 18h18v2H3v-2zm2-4h14l-2-8H7L5 14zm4-8V4h6v2H9z" fill="#ff8c00" opacity="0.9"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">Forge</span>
          <span class="logo-sub">Tool Suite</span>
        </div>
      </a>

      <a href="https://github.com/SeraphimNoob01/ForgeTools" target="_blank" rel="noopener" class="gh-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        View on GitHub
      </a>
    </div>
  </header>

  <!-- ── 404 ── -->
  <main class="page-404">
    <div class="page-404-grid"></div>
    <div class="page-404-glow"></div>

    <div class="content-404">
      <div class="badge-404">
        <div class="badge-dot"></div>
        <span>Page not found</span>
      </div>

      <div class="num-404">404</div>

      <h1 class="title-404">PAGE DOESN'T EXIST</h1>

      <p class="desc-404">
        The page you're looking for doesn't exist or has been moved.<br>
        Head back to base.
      </p>

      <div class="actions-404">
        <a href="/" class="btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Tools
        </a>
        <a href="https://github.com/SeraphimNoob01/ForgeTools/issues" target="_blank" rel="noopener" class="btn-secondary">
          Report an issue
        </a>
      </div>
    </div>
  </main>

  <!-- ── FOOTER ── */-->
  <footer class="site-footer">
    <div class="footer-left">
      Forge Tools &nbsp;·&nbsp; <span>Built for the FAF Community</span>
    </div>
    <div class="footer-right">
      <a href="https://faforever.com" target="_blank" rel="noopener">FAF Homepage</a>
      <a href="https://forum.faforever.com" target="_blank" rel="noopener">FAF Forum</a>
      <a href="https://wiki.faforever.com" target="_blank" rel="noopener">FAF Wiki</a>
      <a href="https://github.com/faforever" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

</body>
</html>
